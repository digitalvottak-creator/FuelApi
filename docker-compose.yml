version: '3.8'

services:
  # PostgreSQL База данных
  db:
    image: postgres:15-alpine
    container_name: fuel_api_db
    environment:
      POSTGRES_USER: fuel_user
      POSTGRES_PASSWORD: fuel_password
      POSTGRES_DB: fuel_api
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuel_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: fuel_api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fuel_api_backend
    environment:
      DATABASE_URL: postgresql://fuel_user:fuel_password@db:5432/fuel_api
      REDIS_URL: redis://redis:6379
      LIQPAY_PUBLIC_KEY: ${LIQPAY_PUBLIC_KEY}
      LIQPAY_PRIVATE_KEY: ${LIQPAY_PRIVATE_KEY}
      API_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      SECRET_KEY: your-secret-key-change-this
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuel_api_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
